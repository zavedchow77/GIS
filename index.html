<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Access Panel</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  background:#fff;
  width:min(380px,90vw);
  padding:35px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
}

h1{
  color:#1e3c72;
  margin-bottom:10px;
}

p{
  color:#666;
  margin-bottom:20px;
}

/* GIF */
.gis-gif{
  width:100%;
  max-width:280px;
  border-radius:14px;
  margin-bottom:25px;
  cursor:pointer;
  transition:.3s;
}

.gis-gif:hover{
  transform:scale(1.03);
}

.btn{
  display:block;
  width:100%;
  padding:15px;
  margin:12px 0;
  border-radius:12px;
  color:#fff;
  text-decoration:none;
  font-size:18px;
  font-weight:bold;
  transition:.3s;
}

.wtp{background:#28a745;}
.stp{background:#ff9800;}
.gw{background:#007bff;}

.btn:hover{
  transform:scale(1.03);
}

footer{
  margin-top:20px;
  color:#888;
  font-size:13px;
}

/* Fullscreen viewer */
.viewer{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.viewer img{
  max-width:95%;
  max-height:95%;
  border-radius:10px;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  color:white;
  font-size:40px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Geographic Information System</h1>
<p>Select a service below</p>

<!-- Clickable GIF -->
<img
class="gis-gif"
src="https://raw.githubusercontent.com/zavedchow77/GIS/main/GIF_0.5.gif"
alt="GIS Animation"
onclick="openViewer()">

<a class="btn wtp"
href="https://script.google.com/macros/s/AKfycbwzNGcApvLmmZJ52kFdU33CBvWFghSlgiInECwXxw31NLfBy4KNtR2nrIs2CekvEKUK_Q/exec"
target="_blank"
rel="noopener noreferrer">
WTP
</a>

<a class="btn stp"
href="https://script.google.com/macros/s/AKfycbz5jzt8gXQzcndlCOPZiPmM1QQ2sshjKeWPv-vMPYTAtiHAWX6N22V26lH0CGVIJ5pl/exec"
target="_blank"
rel="noopener noreferrer">
STP
</a>

<a class="btn gw"
href="https://script.google.com/macros/s/AKfycbzDJCHHykLlzACUpd9l-qeNmUX5uE9l1M7PT4YG12nBVL7U8FVZ_HSSP-dn1raln0c6zw/exec"
target="_blank"
rel="noopener noreferrer">
GW
</a>

<footer>
© 2026 Quick Access Panel
</footer>

</div>

<!-- Fullscreen GIF -->
<div class="viewer" id="viewer" onclick="closeViewer()">
<span class="close">&times;</span>

<img
src="https://raw.githubusercontent.com/zavedchow77/GIS/main/GIF_0.5.gif"
alt="Full GIF">

</div>

<script>
function openViewer(){
  document.getElementById("viewer").style.display="flex";
}

function closeViewer(){
  document.getElementById("viewer").style.display="none";
}
</script>

</body>
</html>
