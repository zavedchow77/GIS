<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Access Panel</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  background:#fff;
  padding:35px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
  text-align:center;
  width:min(380px,90vw);
}

h1{
  color:#1e3c72;
  margin-bottom:10px;
  font-size:28px;
}

p{
  color:#666;
  margin-bottom:20px;
}

/* GIF */
.gis-gif{
  width:100%;
  max-width:280px;
  border-radius:14px;
  margin:10px auto 25px;
  display:block;
  box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.btn{
  display:block;
  width:100%;
  padding:15px;
  margin:12px 0;
  text-decoration:none;
  color:white;
  font-size:18px;
  font-weight:bold;
  border-radius:12px;
  transition:
    transform .3s,
    background .3s;
}

.btn:hover{
  transform:scale(1.03);
}

.wtp{
  background:#28a745;
}

.wtp:hover{
  background:#218838;
}

.stp{
  background:#ff9800;
}

.stp:hover{
  background:#e68900;
}

.gw{
  background:#007bff;
}

.gw:hover{
  background:#0056b3;
}

footer{
  margin-top:20px;
  font-size:13px;
  color:#888;
}
</style>
</head>

<body>

<div class="container">

<h1>Geographic Information System</h1>
<p>Select a service below</p>

<!-- GIF from GitHub -->
<img
src="https://raw.githubusercontent.com/zavedchow77/GIS/main/GIF_0.5.gif"
alt="GIS Animation"
class="gis-gif">

<a
class="btn wtp"
href="https://script.google.com/macros/s/AKfycbwzNGcApvLmmZJ52kFdU33CBvWFghSlgiInECwXxw31NLfBy4KNtR2nrIs2CekvEKUK_Q/exec"
target="_blank"
rel="noopener noreferrer">
WTP
</a>

<a
class="btn stp"
href="https://script.google.com/macros/s/AKfycbz5jzt8gXQzcndlCOPZiPmM1QQ2sshjKeWPv-vMPYTAtiHAWX6N22V26lH0CGVIJ5pl/exec"
target="_blank"
rel="noopener noreferrer">
STP
</a>

<a
class="btn gw"
href="https://script.google.com/macros/s/AKfycbzDJCHHykLlzACUpd9l-qeNmUX5uE9l1M7PT4YG12nBVL7U8FVZ_HSSP-dn1raln0c6zw/exec"
target="_blank"
rel="noopener noreferrer">
GW
</a>

<footer>
© 2026 Quick Access Panel
</footer>

</div>

</body>
</html>
